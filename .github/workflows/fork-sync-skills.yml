name: Sync upstream & merge-forward skill branches

on:
  # Triggered by upstream repo via repository_dispatch
  repository_dispatch:
    types: [upstream-main-updated]
  # Fallback: run on a schedule in case dispatch isn't configured
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  # Also run when fork's main is pushed directly
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  workflows: write

concurrency:
  group: fork-sync
  cancel-in-progress: true

jobs:
  sync-and-merge:
    if: github.repository != 'qwibitai/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream main
        id: sync
        run: |
          # Add upstream remote
          git remote add upstream https://github.com/qwibitai/nanoclaw.git
          git fetch upstream main

          # Check if upstream has new commits
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream main."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Attempt merge (allow failure — we handle conflicts below)
          git merge upstream/main --no-edit || true

          # ── Smart conflict resolution ──────────────────────────────────────

          # Content conflicts (UU): files modified on both sides
          content_conflicts() {
            git status --short | awk '/^UU /{print $2}'
          }

          # Modify/delete conflicts: upstream deleted, we modified (UD) or vice versa (DU)
          modify_delete_conflicts() {
            git status --short | awk '/^(UD|DU) /{print $2}'
          }

          # 0. Source files that must always stay at our fork's version,
          #    even if git auto-merged them without a conflict.
          #    - container-runtime.ts: exports PROXY_BIND_HOST, CONTAINER_HOST_GATEWAY
          #      which upstream removed when migrating to OneCLI
          #    - index.ts, container-runner.ts, agent-runner: have imageAttachments
          #      and credential-proxy startup logic
          for f in src/container-runtime.ts src/index.ts \
                   src/container-runner.ts container/agent-runner/src/index.ts \
                   src/ipc.ts src/types.ts src/timezone.ts src/db.ts \
                   src/remote-control.ts src/remote-control.test.ts \
                   src/container-runtime.test.ts src/container-runner.test.ts; do
            echo "Force-keeping ours: $f"
            git checkout HEAD -- "$f" 2>/dev/null || true
          done

          # config.ts: take auto-merge (upstream keeps adding new exports),
          # but ensure our CREDENTIAL_PROXY_PORT addition is preserved.
          if ! grep -q "CREDENTIAL_PROXY_PORT" src/config.ts; then
            echo "Patching src/config.ts: adding CREDENTIAL_PROXY_PORT"
            sed -i '/^export const ONECLI_URL/a\\nexport const CREDENTIAL_PROXY_PORT = parseInt(\n  process.env.CREDENTIAL_PROXY_PORT || '"'"'3001'"'"',\n  10,\n);' src/config.ts
            git add src/config.ts
          fi

          # 1. Fork-identity files: always keep ours
          for f in .env.example repo-tokens/badge.svg; do
            if content_conflicts | grep -qx "$f"; then
              echo "Resolving $f: keeping ours"
              git checkout HEAD -- "$f"
            fi
          done

          # 2. Group CLAUDE.md files: fork-specific agent memory — keep ours
          for f in $(content_conflicts | grep "^groups/"); do
            echo "Resolving $f: keeping ours (group memory)"
            git checkout HEAD -- "$f"
          done

          # 3. Modify/delete conflicts: upstream removed files we still use — keep ours
          for f in $(modify_delete_conflicts); do
            echo "Resolving $f: keeping ours (modify/delete)"
            git add "$f"
          done

          # 4. package.json: smart merge — upstream version, union of all deps
          if content_conflicts | grep -qx "package.json"; then
            echo "Resolving package.json: smart merge"
            node - <<'NODEJS'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const head = JSON.parse(execSync('git show HEAD:package.json').toString());
          const up   = JSON.parse(execSync('git show MERGE_HEAD:package.json').toString());

          // Take upstream's version; keep all other top-level fields from HEAD
          const result = { ...head, version: up.version };

          // Dependencies: start with HEAD (keeps our additions),
          // then overlay upstream pins for shared packages.
          function mergeDeps(ours, theirs) {
            if (!ours && !theirs) return undefined;
            const merged = { ...(ours || {}) };
            for (const [k, v] of Object.entries(theirs || {})) merged[k] = v;
            return Object.fromEntries(Object.entries(merged).sort(([a],[b]) => a.localeCompare(b)));
          }

          result.dependencies    = mergeDeps(head.dependencies,    up.dependencies);
          result.devDependencies = mergeDeps(head.devDependencies, up.devDependencies);

          fs.writeFileSync('package.json', JSON.stringify(result, null, 2) + '\n');
          NODEJS
            git add package.json
          fi

          # 5. package-lock.json: regenerate from the resolved package.json
          if content_conflicts | grep -qx "package-lock.json"; then
            echo "Resolving package-lock.json: regenerating"
            npm install --package-lock-only 2>/dev/null || npm install
            git add package-lock.json
          fi

          # 6. Any remaining source-file conflicts: keep ours as safe fallback
          for f in $(content_conflicts); do
            echo "Resolving $f: keeping ours (source fallback)"
            git checkout HEAD -- "$f"
          done

          # ── Verify all conflicts are resolved ─────────────────────────────
          REMAINING=$(git status --short | grep "^[UAD][UAD] " | awk '{print $2}')
          if [ -n "$REMAINING" ]; then
            echo "::error::Unresolvable conflicts remain: $REMAINING"
            git merge --abort
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Complete the merge commit
          GIT_EDITOR=true git merge --continue

          # ── Validate ──────────────────────────────────────────────────────
          npm ci
          if ! npm run build; then
            echo "::error::Build failed after merging upstream/main"
            git reset --hard "origin/main"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! npm test 2>/dev/null; then
            echo "::error::Tests failed after merging upstream/main"
            git reset --hard "origin/main"
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin main
          echo "synced=true" >> "$GITHUB_OUTPUT"

      - name: Merge main into skill branches
        id: merge
        run: |
          # Re-fetch to pick up any changes pushed since job start
          git fetch origin

          FAILED=""
          SUCCEEDED=""

          # List all remote skill branches
          SKILL_BRANCHES=$(git branch -r --list 'origin/skill/*' | sed 's|origin/||' | xargs)

          if [ -z "$SKILL_BRANCHES" ]; then
            echo "No skill branches found."
            exit 0
          fi

          for BRANCH in $SKILL_BRANCHES; do
            SKILL_NAME=$(echo "$BRANCH" | sed 's|skill/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            git checkout -B "$BRANCH" "origin/$BRANCH"

            if ! git merge main --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git merge --abort
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            # Check if there's anything new to push
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with main."
              SUCCEEDED="$SUCCEEDED $SKILL_NAME"
              continue
            fi

            npm ci

            if ! npm run build; then
              echo "::warning::Build failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            if ! npm test 2>/dev/null; then
              echo "::warning::Tests failed for $BRANCH"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $SKILL_NAME"
              continue
            fi

            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $SKILL_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"

      - name: Open issue for upstream sync failure
        if: steps.sync.outputs.sync_failed == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream sync failed — merge conflict or build failure`,
              body: [
                'The automated sync with `qwibitai/nanoclaw` main failed.',
                '',
                'This usually means upstream made changes that conflict with this fork\'s channel code.',
                '',
                'To resolve manually:',
                '```bash',
                'git fetch upstream main',
                'git merge upstream/main',
                '# resolve conflicts',
                'npm run build && npm test',
                'git push',
                '```',
              ].join('\n'),
              labels: ['upstream-sync']
            });

      - name: Open issue for failed skill merges
        if: steps.merge.outputs.failed != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const body = [
              `The merge-forward workflow failed to merge \`main\` into the following skill branches:`,
              '',
              ...failed.map(s => `- \`skill/${s}\`: merge conflict, build failure, or test failure`),
              '',
              'Please resolve manually:',
              '```bash',
              ...failed.map(s => [
                `git checkout skill/${s}`,
                `git merge main`,
                `# resolve conflicts, then: git push`,
                ''
              ]).flat(),
              '```',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge-forward failed for ${failed.length} skill branch(es)`,
              body,
              labels: ['skill-maintenance']
            });